services:
  postgres:
    image: postgres:16-alpine
    container_name: akademiweal-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: akademiweal
    volumes:
      - akademiweal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akademiweal"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  akademiweal_pgdata:
