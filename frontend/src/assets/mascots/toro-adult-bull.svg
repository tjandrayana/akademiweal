<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 295" width="260" height="295">
  <!-- TORO — Adult Bull · Silver Tier -->
  <!-- Shadow -->
  <ellipse cx="130" cy="288" rx="76" ry="9" fill="#8B8B9A" opacity="0.18"/>
  <!-- Ambient glow -->
  <ellipse cx="130" cy="185" rx="82" ry="46" fill="#A8B8D0" opacity="0.07"/>

  <!-- Bold, longer horns -->
  <path d="M92,80 Q72,48 82,24 Q87,14 88,44 Q74,58 94,80" fill="#EDD88A"/>
  <path d="M168,80 Q188,48 178,24 Q173,14 172,44 Q186,58 166,80" fill="#EDD88A"/>
  <!-- Horn shading -->
  <path d="M92,80 Q72,48 82,24" stroke="#C8B050" stroke-width="1.2" fill="none"/>
  <path d="M168,80 Q188,48 178,24" stroke="#C8B050" stroke-width="1.2" fill="none"/>

  <!-- Ears (bigger, more defined) -->
  <circle cx="46" cy="128" r="26" fill="#8B6030"/>
  <circle cx="46" cy="128" r="17" fill="#C4813A"/>
  <circle cx="46" cy="128" r="9" fill="#A86820"/>
  <circle cx="214" cy="128" r="26" fill="#8B6030"/>
  <circle cx="214" cy="128" r="17" fill="#C4813A"/>
  <circle cx="214" cy="128" r="9" fill="#A86820"/>

  <!-- Mature head (slightly narrower) -->
  <ellipse cx="130" cy="132" rx="82" ry="84" fill="#8B6030"/>
  <ellipse cx="130" cy="128" rx="78" ry="80" fill="#A87040"/>
  <!-- Forehead frown crease (serious) -->
  <path d="M108,94 Q130,87 152,94" stroke="#7A5020" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- Sharp confident eyes -->
  <ellipse cx="100" cy="122" rx="22" ry="23" fill="white"/>
  <ellipse cx="160" cy="122" rx="22" ry="23" fill="white"/>
  <circle cx="103" cy="126" r="15" fill="#1A0800"/>
  <circle cx="163" cy="126" r="15" fill="#1A0800"/>
  <circle cx="103" cy="127" r="8" fill="#050100"/>
  <circle cx="163" cy="127" r="8" fill="#050100"/>
  <!-- Catchlights -->
  <circle cx="111" cy="116" r="7" fill="white"/>
  <circle cx="171" cy="116" r="7" fill="white"/>
  <!-- Thick confident eyebrows -->
  <path d="M82,107 Q100,99 118,104" stroke="#5A3010" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M142,104 Q160,99 178,107" stroke="#5A3010" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Snout (wider, mature) -->
  <ellipse cx="130" cy="158" rx="40" ry="28" fill="#C8906A"/>
  <!-- Highlight -->
  <ellipse cx="116" cy="148" rx="18" ry="9" fill="#DDA880" opacity="0.4"/>
  <!-- Nostrils -->
  <ellipse cx="116" cy="164" rx="10.5" ry="8.5" fill="#5A2A08"/>
  <ellipse cx="144" cy="164" rx="10.5" ry="8.5" fill="#5A2A08"/>
  <!-- Confident smirk -->
  <path d="M106,178 Q130,192 154,178" stroke="#5A2A08" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Subtle blush (professional) -->
  <ellipse cx="70" cy="148" rx="17" ry="9" fill="#E85030" opacity="0.13"/>
  <ellipse cx="190" cy="148" rx="17" ry="9" fill="#E85030" opacity="0.13"/>

  <!-- Neck fur line -->
  <path d="M68,196 Q130,182 192,196" stroke="#7A5020" stroke-width="1.5" fill="none"/>

  <!-- Charcoal suit jacket -->
  <path d="M28,290 Q28,248 56,234 Q130,218 204,234 Q232,248 232,290 Z" fill="#1E2A3A"/>
  <!-- Shoulder bulk -->
  <ellipse cx="50" cy="254" rx="30" ry="42" fill="#1E2A3A"/>
  <ellipse cx="210" cy="254" rx="30" ry="42" fill="#1E2A3A"/>

  <!-- White shirt collar -->
  <path d="M98,218 L130,228 L162,218 L168,208 Q130,198 92,208 Z" fill="#EAEAE0"/>
  <!-- Collar lines -->
  <path d="M130,228 L98,218" stroke="#D0CEC8" stroke-width="1" fill="none"/>
  <path d="M130,228 L162,218" stroke="#D0CEC8" stroke-width="1" fill="none"/>

  <!-- Silver tie -->
  <rect x="118" y="208" width="24" height="18" rx="4" fill="#8090A8"/>
  <path d="M122,226 L112,282 L130,294 L148,282 L138,226 Z" fill="#A8B8D0"/>
  <!-- Tie highlight stripe -->
  <path d="M124,234 L116,276" stroke="#C8D8E8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Tie shadow edge -->
  <path d="M136,234 L142,276" stroke="#8090A8" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Lapels -->
  <path d="M72,208 L98,218 L80,256" fill="#2A3848"/>
  <path d="M188,208 L162,218 L180,256" fill="#2A3848"/>

  <!-- Suit button -->
  <circle cx="130" cy="252" r="4" fill="rgba(255,255,255,0.1)"/>
  <circle cx="130" cy="268" r="4" fill="rgba(255,255,255,0.1)"/>
</svg>
